name: Terraform Deploy

on:
  push:
    branches:
      - development
  pull_request:
    branches:
      - development

jobs:
  terraform:
    name: Terraform Plan & Apply
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: templates   # all steps run inside templates/

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set ARM env vars from AZURE_CREDENTIALS
        run: |
          echo "ARM_CLIENT_ID=$(echo '${{ secrets.AZURE_CREDENTIALS }}' | jq -r .clientId)" >> $GITHUB_ENV
          echo "ARM_CLIENT_SECRET=$(echo '${{ secrets.AZURE_CREDENTIALS }}' | jq -r .clientSecret)" >> $GITHUB_ENV
          echo "ARM_SUBSCRIPTION_ID=$(echo '${{ secrets.AZURE_CREDENTIALS }}' | jq -r .subscriptionId)" >> $GITHUB_ENV
          echo "ARM_TENANT_ID=$(echo '${{ secrets.AZURE_CREDENTIALS }}' | jq -r .tenantId)" >> $GITHUB_ENV

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      # Check if tfstate resource group EXISTS in our subscription — not global name availability
      - name: Bootstrap Remote State (if not exists)
        run: |
          RG_EXISTS=$(az group exists --name tfstate-rg)
          if [ "$RG_EXISTS" = "false" ]; then
            echo "Resource group not found. Running bootstrap..."
            bash bootstrap.sh
          else
            echo "Backend resource group already exists, skipping bootstrap."
          fi

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      # Apply only on push to development, not on PRs
      - name: Terraform Apply
        if: github.event_name == 'push' && github.ref == 'refs/heads/development'
        run: terraform apply -auto-approve tfplan